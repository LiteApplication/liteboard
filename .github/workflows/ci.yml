name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-tests:
    name: Server unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install server (with dev deps)
        working-directory: server
        run: pip install -e ".[dev]"

      - name: Run pytest
        working-directory: server
        run: python -m pytest -q

  web-build:
    name: Build Vue SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

  docker-build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [server-tests, web-build]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR image paths must be lowercase; the repo name may contain capitals.
      - name: Compute image prefix
        id: img
        run: echo "prefix=${REGISTRY}/${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"

      # Only log in / push when running on the main branch of this repo
      # (pull requests from forks can't access the registry token).
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.img.outputs.prefix }}/server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build daemon image
        uses: docker/build-push-action@v6
        with:
          context: ./daemon
          file: daemon/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.img.outputs.prefix }}/daemon:latest
          cache-from: type=gha,scope=daemon
          cache-to: type=gha,mode=max,scope=daemon
