# LiteBoard — Docker Swarm stack.
#
#   docker stack deploy -c docker-compose.yml liteboard
#
# That's it — no secrets, no .env, no keys to generate. On first deploy the
# server boots UNCONFIGURED and prints a one-time setup token to its logs:
#
#   docker service logs liteboard_server        # look for "Setup token: …"
#
# Open the published URL, enter the token, fill in your Authentik OIDC details,
# and the server generates its signing key and hands the public key to every
# daemon automatically over the manager socket. State lives in the
# `liteboard_data` volume (config + generated key), so it survives restarts.
version: "3.8"

services:
  server:
    image: ${LITEBOARD_IMAGE:-ghcr.io/liteapplication/liteboard/server:latest}
    build:
      context: .
      dockerfile: server/Dockerfile
    networks: [liteboard]
    ports:
      - target: 8000
        published: ${LITEBOARD_PORT:-8000}
        protocol: tcp
        mode: ingress
    environment:
      LITEBOARD_DATA_DIR: /data
      LITEBOARD_DOCKER_HOST: unix:///var/run/docker.sock
      LITEBOARD_DAEMON_PORT: ${LITEBOARD_DAEMON_PORT:-9187}
      LITEBOARD_DAEMON_SCHEME: http
      LITEBOARD_POLL_INTERVAL: ${LITEBOARD_POLL_INTERVAL:-5}
      # OIDC / base URL / session secret are configured by the setup wizard and
      # persisted to the volume. Advanced users may instead bake them in here.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - liteboard_data:/data
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any

  daemon:
    image: ${LITEBOARD_DAEMON_IMAGE:-ghcr.io/liteapplication/liteboard/daemon:latest}
    build:
      context: ./daemon
      dockerfile: Dockerfile
    # One instance per node. Boots "unprovisioned" until the server injects the
    # signing public key (the env below stays empty on a plain deploy).
    environment:
      LITEBOARD_SERVER_PUBKEY: ${LITEBOARD_SERVER_PUBKEY:-}
      LITEBOARD_DAEMON_PORT: ${LITEBOARD_DAEMON_PORT:-9187}
      LITEBOARD_DAEMON_BIND: 0.0.0.0
      LITEBOARD_PROCFS: /host/proc
      LITEBOARD_DOCKER_SOCK: /var/run/docker.sock
      LITEBOARD_NODE_NAME: "{{.Node.Hostname}}"
    # Host-mode publish so the server reaches each daemon at <node-ip>:PORT.
    ports:
      - target: ${LITEBOARD_DAEMON_PORT:-9187}
        published: ${LITEBOARD_DAEMON_PORT:-9187}
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
    deploy:
      mode: global
      # The server locates the daemon service by this label to inject the key.
      labels:
        liteboard.role: daemon
      restart_policy:
        condition: any

networks:
  liteboard:
    driver: overlay
    attachable: true

volumes:
  liteboard_data:

# --- Optional: private image registry ---------------------------------------
# Public GHCR images need no auth. To pull images onto workers from a PRIVATE
# registry, deploy with `--with-registry-auth`. To let LiteBoard detect updates
# for PRIVATE app images, add a registry-creds secret and point the server at it
# (uncomment below):
#
# secrets:
#   liteboard_registry_creds:
#     external: true
# services:
#   server:
#     secrets: [liteboard_registry_creds]
#     environment:
#       LITEBOARD_REGISTRY_CONFIG_FILE: /run/secrets/liteboard_registry_creds
